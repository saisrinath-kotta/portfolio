<!DOCTYPE html>
<html>
<head>
    <title>Simple Interest Calculator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 60px;
        }
        input {
            padding: 8px;
            margin: 8px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            color: green;
        }
    </style>
</head>
<body>

    <h1>Simple Interest Calculator</h1>

    <input type="number" id="principal" placeholder="Enter Principal"><br>
    <input type="number" id="rate" placeholder="Enter Rate (%)"><br>
    <input type="number" id="time" placeholder="Enter Time (years)"><br>

    <button onclick="showInterest()">Calculate</button>

    <p id="result"></p>

    <script>
        const p = document.getElementById("principal");
        const t = document.getElementById("time");
        const r = document.getElementById("rate");
        const d = document.getElementById("result");

       function showInterest(){
        let principal = p.value;
        let time = t.value;
        let re = r.value;
        d.textContent=(principal*time*re)/100;
       }

         </script>

</body>
</html>
