<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BMI Calculator | HealthAware</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="top-header">

<a href="index.html" class="logo">🏥 HealthAware</a>

<div class="nav-right">
<button class="theme-toggle" onclick="toggleTheme()">🌙</button>
</div>

</header>


<section class="section">

<h2>BMI Calculator</h2>

<div class="tool-box">

<label>Height (cm)</label>
<input type="number" id="height" placeholder="Enter height">

<label>Weight (kg)</label>
<input type="number" id="weight" placeholder="Enter weight">

<button onclick="calculateBMI()">Calculate BMI</button>

<p id="bmi-result"></p>

</div>

</section>


<footer class="footer">
<p>© 2026 HealthAware | Created by Sai Srinath</p>
</footer>


<script src="script.js"></script>

<script>

function calculateBMI(){

let height = document.getElementById("height").value / 100;
let weight = document.getElementById("weight").value;

if(height==0 || weight==0){
document.getElementById("bmi-result").innerHTML="Please enter valid values";
return;
}

let bmi = weight / (height * height);

let category="";

if(bmi < 18.5)
category="Underweight";

else if(bmi < 24.9)
category="Normal Weight";

else if(bmi < 29.9)
category="Overweight";

else
category="Obese";

document.getElementById("bmi-result").innerHTML =
"Your BMI: " + bmi.toFixed(2) + " (" + category + ")";

}

</script>

</body>
</html>
